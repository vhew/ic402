# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/tags/v0.1.0/docs/schemas/icp-yaml-schema.json
#
# ic402 — example canister + local dev ledgers.

canisters:
  - name: example
    recipe:
      type: '@dfinity/motoko@v4.1.0'
      configuration:
        main: example/main.mo
        candid: example/example.did
        args: ''

  - name: ckusdc_ledger
    recipe:
      type: '@dfinity/prebuilt@v2.0.0'
      configuration:
        path: .icp/icrc1-ledger.wasm.gz
        candid: .icp/icrc1-ledger.did
    init_args:
      path: .icp/ckusdc-ledger-init.candid
      format: candid

  - name: evm_rpc
    recipe:
      type: '@dfinity/prebuilt@v2.0.0'
      configuration:
        path: .icp/evm_rpc.wasm.gz
        candid: .icp/evm_rpc.did
    init_args:
      path: .icp/evm-rpc-init.candid
      format: candid

  - name: zk_verifier
    recipe:
      type: '@dfinity/prebuilt@v2.0.0'
      configuration:
        path: example/zk-verifier/target/wasm32-unknown-unknown/release/zk_verifier.wasm.gz
        candid: example/zk-verifier/zk_verifier.did

networks:
  - name: local
    mode: managed
    gateway:
      port: 4944

  - name: mainnet
    mode: connected
    url: https://icp-api.io

environments:
  - name: local
    network: local
    canisters: [example, ckusdc_ledger, evm_rpc, zk_verifier]

  - name: ic
    network: mainnet
    canisters: [example]
